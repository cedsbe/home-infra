name: Validate Local Runners

on:
  - workflow_dispatch

jobs:
  validate-local-runners:
    runs-on: arc-runners-home-infra
    timeout-minutes: 15
    name: Validate Local Runners
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Validate local runners
        run: |
          echo "🔍 Validating Local Runners"
          echo "================================="
          echo "✅ Local runners are available and ready for use"
          echo "---------------------------------"
          echo "🏠 Home Infra Runner: $(hostname)"

      - name: Display Code Source Information
        run: |
          echo "🔍 Code Source Information"
          echo "================================="
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Workflow Run ID: ${{ github.run_id }}"
          echo "Workflow Run Number: ${{ github.run_number }}"

      - name: Display Runner Environment Information
        run: |
          echo "🔍 Runner Environment Information"
          echo "================================="
          echo "Runner OS: $(uname -s)"
          echo "Runner Architecture: $(uname -m)"
          echo "Runner Kernel Version: $(uname -r)"
          echo "Runner Uptime: $(uptime -p)"
          echo "---------------------------------"
          echo "Environment Variables:"
          printenv | sort

      - name: Display git-crypt Status
        run: |
          echo "🔍 git-crypt Status"
          echo "================================="
          if command -v git-crypt &> /dev/null; then
            echo "✅ git-crypt is installed"
            git-crypt status
          else
            echo "❌ git-crypt is not installed"
            exit 1
          fi

      - name: Unlock git-crypt
        env:
          GIT_CRYPT_KEY_BASE64: ${{ secrets.GIT_CRYPT_KEY_BASE64 }}
        run: |
          echo "🔍 Unlocking git-crypt"
          echo "================================="
          umask 077
          KEY_FILE=$(mktemp)
          trap 'rm -f "$KEY_FILE"' EXIT
          echo "$GIT_CRYPT_KEY_BASE64" | base64 --decode > "$KEY_FILE"
          if git-crypt unlock "$KEY_FILE"; then
            echo "✅ git-crypt unlocked successfully"
            echo "---------------------------------"
            echo "🔍 Display git-crypt canary file:"
            cat .git-crypt-canary
            echo "---------------------------------"
          else
            echo "❌ Failed to unlock git-crypt"
            exit 1
          fi

      - name: Display Terraform version
        run: |
          echo "🔍 Terraform Status"
          echo "================================="
          if command -v terraform &> /dev/null; then
            echo "✅ Terraform is installed"
            terraform version
          else
            echo "❌ Terraform is not installed"
            exit 1
          fi

      - name: Folder structure
        run: |
          echo "🔍 Folder tree in $(pwd)"
          echo "================================="
          tree -L 3
