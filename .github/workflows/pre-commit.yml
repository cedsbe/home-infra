name: Pre-commit

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]
  workflow_dispatch: # Manual trigger from GitHub UI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Pre-commit checks
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Remove git-crypt encrypted files
        run: |
          echo "🔐 Removing git-crypt encrypted files (not unlocked in CI)..."
          # Remove files based on .gitattributes patterns
          find . -name "*.secrets.auto.tfvars" -type f -delete
          find . -name "*.secrets.auto.pkrvars.hcl" -type f -delete
          find . -name "backend.config" -type f -delete
          find . -name ".vault_password" -type f -delete
          find . -name ".env" -type f -delete
          find . -name "kubeconfig" -type f -delete
          find . -name "*.key" -type f -delete
          find . -name "*.pem" -type f -delete
          rm -rf ./sensitive/ 2>/dev/null || true
          echo "✅ Encrypted files removed successfully"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.x"

      - name: Install CLI tools
        uses: alexellis/arkade-get@519940f35dea471a2a508b9ddba7be1ddadbb4cc # master
        with:
          kubectl: v1.35.3 # renovate: datasource=github-releases depName=kubernetes/kubernetes packageName=kubernetes/kubernetes versioning=semver-coerced registryUrl=https://github.com
          kustomize: v5.8.0 # renovate: datasource=github-releases depName=kubernetes-sigs/kustomize
          kubeconform: v0.7.0 # renovate: datasource=github-releases depName=yannh/kubeconform
          task: v3.49.1 # renovate: datasource=github-releases depName=go-task/task packageName=go-task/task versioning=semver-coerced registryUrl=https://github.com
          tflint: v0.61.0 # renovate: datasource=github-releases depName=terraform-linters/tflint packageName=terraform-linters/tflint versioning=semver-coerced registryUrl=https://github.com
          terraform: v1.14.8 # renovate: datasource=github-releases depName=hashicorp/terraform packageName=hashicorp/terraform versioning=semver-coerced registryUrl=https://github.com
          packer: v1.15.1 # renovate: datasource=github-releases depName=hashicorp/packer packageName=hashicorp/packer versioning=semver-coerced registryUrl=https://github.com

      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"

      - name: Install cspell
        run: |
          echo "📝 Installing cspell for spell checking..."
          npm install -g cspell
          cspell --version
          echo "✅ cspell installed successfully"

      - name: Install yamllint
        run: |
          echo "📋 Installing yamllint for YAML validation..."
          pip install yamllint
          echo "✅ yamllint installed successfully"

      - name: Cache pre-commit
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-py3.x-${{ hashFiles('.pre-commit-config.yaml') }}-${{ hashFiles('package*.json') }}

      - name: Cache Node.js dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.npm
          key: node-${{ runner.os }}-${{ hashFiles('package*.json') }}

      - name: Run pre-commit
        uses: cloudposse/github-action-pre-commit@828247764461bc41b2bd267e24d76e91a279b093 # v4.0.0

      - name: Upload pre-commit logs on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: pre-commit-logs
          path: ~/.cache/pre-commit/
          retention-days: 7

  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Security scan
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # master
        with:
          scan-type: "config"
          hide-progress: false
          format: "sarif"
          output: "trivy-results.sarif"
          trivy-config: ".github/trivy/trivy.yaml"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      - name: Upload Trivy results as artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: trivy-results
          path: trivy-results.sarif
          retention-days: 30

      - name: Display Trivy scan summary
        if: always()
        run: |
          echo "🔍 Trivy Security Scan Completed"
          echo "================================="
          if [ -f "trivy-results.sarif" ]; then
            echo "✅ SARIF results generated successfully"
            echo "📊 Results uploaded to Security tab (if Code Scanning is enabled)"
            echo "📦 Results also available as workflow artifact for 30 days"
          else
            echo "❌ SARIF results not found - scan may have failed"
            echo "💡 Check previous steps for errors"
          fi
