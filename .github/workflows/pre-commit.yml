name: Pre-commit

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]
  workflow_dispatch: # Manual trigger from GitHub UI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Pre-commit checks
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Remove git-crypt encrypted files
        run: |
          echo "🔐 Removing git-crypt encrypted files (not unlocked in CI)..."
          # Remove files based on .gitattributes patterns
          find . -name "*.secrets.auto.tfvars" -type f -delete
          find . -name "*.secrets.auto.pkrvars.hcl" -type f -delete
          find . -name "backend.config" -type f -delete
          find . -name ".vault_password" -type f -delete
          find . -name ".env" -type f -delete
          find . -name "kubeconfig" -type f -delete
          find . -name "*.key" -type f -delete
          find . -name "*.pem" -type f -delete
          rm -rf ./sensitive/ 2>/dev/null || true
          echo "✅ Encrypted files removed successfully"

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.x"

      - name: Install CLI tools
        uses: alexellis/arkade-get@b32ceeccb72e101099f4a031fabc49ca3123abb7 # master
        with:
          kubectl: v1.36.2 # renovate: datasource=github-releases depName=kubernetes/kubernetes packageName=kubernetes/kubernetes versioning=semver-coerced registryUrl=https://github.com
          kustomize: v5.8.0 # renovate: datasource=github-releases depName=kubernetes-sigs/kustomize
          kubeconform: v0.8.0 # renovate: datasource=github-releases depName=yannh/kubeconform packageName=yannh/kubeconform versioning=semver-coerced registryUrl=https://github.com
          task: v3.52.0 # renovate: datasource=github-releases depName=go-task/task packageName=go-task/task versioning=semver-coerced registryUrl=https://github.com
          tflint: v0.64.0 # renovate: datasource=github-releases depName=terraform-linters/tflint packageName=terraform-linters/tflint versioning=semver-coerced registryUrl=https://github.com
          terraform: v1.15.8 # renovate: datasource=github-releases depName=hashicorp/terraform packageName=hashicorp/terraform versioning=semver-coerced registryUrl=https://github.com
          packer: v1.15.4 # renovate: datasource=github-releases depName=hashicorp/packer packageName=hashicorp/packer versioning=semver-coerced registryUrl=https://github.com

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"

      - name: Install cspell
        run: |
          echo "📝 Installing cspell for spell checking..."
          npm install -g cspell
          cspell --version
          echo "✅ cspell installed successfully"

      - name: Install yamllint
        run: |
          echo "📋 Installing yamllint for YAML validation..."
          pip install yamllint
          echo "✅ yamllint installed successfully"

      - name: Cache pre-commit
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-py3.x-${{ hashFiles('.pre-commit-config.yaml') }}-${{ hashFiles('package*.json') }}

      - name: Cache Node.js dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.npm
          key: node-${{ runner.os }}-${{ hashFiles('package*.json') }}

      - name: Run pre-commit
        uses: cloudposse/github-action-pre-commit@ed9906221c8a4ee1dcb1e665da895998e0f7b396 # v4.1.0

      - name: Upload pre-commit logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pre-commit-logs
          path: ~/.cache/pre-commit/
          retention-days: 7

  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Security scan
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8 # master
        with:
          scan-type: "config"
          hide-progress: false
          format: "sarif"
          output: "trivy-results.sarif"
          trivy-config: ".github/trivy/trivy.yaml"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      - name: Upload Trivy results as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: trivy-results
          path: trivy-results.sarif
          retention-days: 30

      - name: Display Trivy scan summary
        if: always()
        run: |
          echo "🔍 Trivy Security Scan Completed"
          echo "================================="
          if [ -f "trivy-results.sarif" ]; then
            echo "✅ SARIF results generated successfully"
            echo "📊 Results uploaded to Security tab (if Code Scanning is enabled)"
            echo "📦 Results also available as workflow artifact for 30 days"
          else
            echo "❌ SARIF results not found - scan may have failed"
            echo "💡 Check previous steps for errors"
          fi
