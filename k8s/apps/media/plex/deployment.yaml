apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
  namespace: plex
  labels:
    app: plex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plex
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: plex
    spec:
      nodeSelector:
        topology.kubernetes.io/zone: hsp-proxmox0
      securityContext:
        runAsNonRoot: true
        runAsUser: 2501
        runAsGroup: 2501
        fsGroup: 2501
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
        - name: plex
          image: ghcr.io/home-operations/plex:1.43.1.10576@sha256:f2e33a01419c0b11f1e9d09674418151f7f6dec45a8d61a74b999abfad2115b6 # renovate: datasource=docker depName=ghcr.io/home-operations/plex packageName=ghcr.io/home-operations/plex versioning=docker registryUrl=https://ghcr.io
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: plex-tcp
              containerPort: 32400
              protocol: TCP
            - name: plex-udp
              containerPort: 32400
              protocol: UDP
          readinessProbe:
            tcpSocket:
              port: 32400
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 32400
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          env:
            - name: TZ
              value: "Europe/Brussels"
            - name: PLEX_CLAIM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: plex-claim
                  key: PLEX_CLAIM_TOKEN
                  optional: true
          volumeMounts:
            - name: plex-config
              mountPath: /config
            - name: tmp
              mountPath: /tmp
            - name: transcode
              mountPath: /transcode
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 4000m
              memory: 4Gi
      volumes:
        - name: plex-config
          persistentVolumeClaim:
            claimName: plex-config
        - name: tmp
          emptyDir: {}
        - name: transcode
          emptyDir: {}
        - name: data
          nfs:
            server: 192.168.65.250
            path: /volume1/media
