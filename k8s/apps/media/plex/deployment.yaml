apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
  namespace: plex
  labels:
    app: plex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plex
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: plex
    spec:
      nodeSelector:
        topology.kubernetes.io/zone: hsp-proxmox0
      securityContext:
        runAsNonRoot: true
        runAsUser: 2501
        runAsGroup: 2501
        fsGroup: 2501
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
        - name: plex
          image: ghcr.io/home-operations/plex:1.43.0.10492@sha256:8cb062f2b0660bd7811387e6c799da0ce5f18112078fe21485c11adcc83a9c1c
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: plex-tcp
              containerPort: 32400
              protocol: TCP
            - name: plex-udp
              containerPort: 32400
              protocol: UDP
          env:
            - name: TZ
              value: "Europe/Brussels"
            - name: PLEX_CLAIM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: plex-claim
                  key: PLEX_CLAIM_TOKEN
                  optional: true
          volumeMounts:
            - name: plex-config
              mountPath: /config
            - name: tmp
              mountPath: /tmp
            - name: transcode
              mountPath: /transcode
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 4000m
              memory: 4Gi
      volumes:
        - name: plex-config
          persistentVolumeClaim:
            claimName: plex-config
        - name: tmp
          emptyDir: {}
        - name: transcode
          emptyDir: {}
        - name: data
          nfs:
            server: 192.168.65.250
            path: /volume1/media
