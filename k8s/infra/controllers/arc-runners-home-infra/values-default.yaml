githubConfigUrl: https://github.com/cedsbe/home-infra
githubConfigSecret: arc-github-secret

minRunners: 0
maxRunners: 5

controllerServiceAccount:
  namespace: arc-systems
  name: arc-systems-gha-rs-controller

template:
  spec:
    containers:
      - name: runner
        image: "ghcr.io/cedsbe/actions-runner-cedsbe:v1.0.0@sha256:2993eba02adcb90d368af949fbe423e3df86c898afaeffaa2488025947465e6c"
        command: ["/home/runner/run.sh"]
